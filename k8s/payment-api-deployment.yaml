apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: order-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: payment-api
          image: ordersystem-payment_api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081

          envFrom:
            - configMapRef:
                name: orders-config
          env:
           - name: ASPNETCORE_URLS
             value: http://0.0.0.0:8081