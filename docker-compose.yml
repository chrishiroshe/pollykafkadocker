services:
  postgres:
    image: postgres:15
    container_name: orders_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordersdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordersdb"]
      interval: 5s
      timeout: 5s
      retries: 15

  kafka:
    image: confluentinc/cp-kafka:7.8.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-init:
     image: confluentinc/cp-kafka:7.8.7
     container_name: kafka_init
     depends_on:
       kafka:
         condition: service_started
     entrypoint: ["/bin/sh", "-c"]
     command: >
      "
      echo 'Waiting Kafka...' &&
      cub kafka-ready -b kafka:9092 1 30 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders-confirmed --replication-factor 1 --partitions 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-succeeded --replication-factor 1 --partitions 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-failed --replication-factor 1 --partitions 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory-reserve-requested --replication-factor 1 --partitions 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory-reserved --replication-factor 1 --partitions 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory-release-requested --replication-factor 1 --partitions 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-requested --replication-factor 1 --partitions 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory-reservation-failed --replication-factor 1 --partitions 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory-released --replication-factor 1 --partitions 1
      echo 'Kafka topics created.'
      "

  payment_api:
    build:
      context: .
      dockerfile: PaymentGateway.Api/Dockerfile
    container_name: payment_api
    ports:
      - "8081:8081"
    environment:
      ASPNETCORE_URLS: http://+:8081
      Kafka__BootstrapServers: kafka:9092

  migrations:
    build:
      context: .
      dockerfile: Order.Api/DockerfileMigration
    container_name: orders_migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      DisableWorkers: "true"
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=ordersdb;Username=postgres;Password=postgres
      PaymentGateway__BaseUrl: http://payment_api:8081/
      PaymentGateway__Mode: random
      Outbox__MaxParallelism: 6
      Outbox__BatchSize: 20
      Kafka__BootstrapServers: kafka:9092
    command: >
      dotnet ef database update
      --project /src/OrderSystem.Infrastructure/OrderSystem.Infrastructure.csproj
      --startup-project /src/Order.Api/Order.Api.csproj

  api:
    build:
      context: .
      dockerfile: Order.Api/Dockerfile
    container_name: orders_api
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      payment_api:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Docker
      DisableWorkers: "false"
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=ordersdb;Username=postgres;Password=postgres
      PaymentGateway__BaseUrl: http://payment_api:8081/
      PaymentGateway__Mode: random
      Outbox__MaxParallelism: 6
      Outbox__BatchSize: 20
      Kafka__BootstrapServers: kafka:9092

  kafka-ui:
    image: provectuslabs/kafka-ui
    ports:
    - "8090:8080"
    environment:
     KAFKA_CLUSTERS_0_NAME: local
     KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

volumes:
  postgres_data: